# Streamlit Cloud Secrets 설정 파일
# Streamlit Cloud 대시보드 → App settings → Secrets 에 이 내용을 붙여넣으세요
# 이 파일은 .gitignore에 추가하고 실제 값은 절대 커밋하지 마세요

# OPENAI_API_KEY는 시스템 환경변수에서 읽어옵니다 (여기 입력하지 마세요)

# 08_Advanced_RAG Docker 백엔드 URL (배포 후 실제 URL로 교체)
RAG_API_URL = "https://your-rag-backend.example.com"
RAG_API_KEY = "your-secret-key-here"

# Cloud MySQL 접속 정보
DB_HOST     = "your-db-host.example.com"
DB_PORT     = "3306"
DB_USER     = "fitstep_user"
DB_PASSWORD = "your-db-password"
DB_NAME     = "fitstep"
